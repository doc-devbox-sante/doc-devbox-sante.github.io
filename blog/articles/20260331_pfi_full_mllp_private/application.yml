logging:
    level:
        fr.devboxsante: info
        fr.devboxsante.dmp: info
        fr.devboxsante.pfi: debug
   
spring.profiles:
  active:
    - pfi
    - lm
    - dmp
    - mss
    - antivirus
    - vague1

devbox-sante:
  pfi:
    intermediations:
        test-mllp:
            systemeSource:
                nom: DevBox-Sante PFI
                version: 1
            structureSanteSource:
                nom: CH Test 1852516
                idNational: 300000001852516

            systemeDestinataire:
                nom: DevBox-Sante PFI Connector
            structureSanteDestinataire:
                idNational: 10B0182382

            connector:
                protocol: mllp
                hostname: devbox-sante
                port: 5454
                mllpLocalPort: 5453
            out:
                dmp:
                    authP12InBase64: ${DEVBOX_PFI_DMP_AUTH_P12}
                    authP12Password: ${DEVBOX_PFI_DMP_AUTH_P12_PASSWORD}
                    signP12InBase64: ${DEVBOX_PFI_DMP_SIGN_P12}
                    signP12Password: ${DEVBOX_PFI_DMP_SIGN_P12_PASSWORD}
                    soumissionContentType: "04"  # Hospitalisation de jour
                mss:
                    operatorName: ${DEVBOX_PFI_MSS_OPERATOR}
                    userName: ${DEVBOX_PFI_MSS_USERNAME}
                    p12InBase64: ${DEVBOX_PFI_MSS_P12:}
                    p12Password: ${DEVBOX_PFI_MSS_P12_PASSWORD:Gblancheneige!111}